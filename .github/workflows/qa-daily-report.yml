name: 飞书QA客观执行差异日报

on:
  schedule:
    # 北京时间 10:00 = UTC 2:00
    - cron: "0 2 * * *"
  workflow_dispatch:  # 允许手动触发

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests

      - name: 执行播报
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python3 scripts/qa_daily_report.py
